name: Build Checklist Android

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        type: choice
        options:
          - release
          - debug
        default: release
  push:
    branches: [main]
    paths:
      - 'apps/checklist/**'
      - 'packages/framing/**'
      - 'packages/supabase/**'
      - 'packages/auth/**'
      - 'packages/auth-ui/**'
      - 'packages/export/**'
      - 'packages/tokens/**'
      - '.github/workflows/build-checklist-android.yml'

jobs:
  build-android:
    name: Build Android (${{ inputs.build_type || 'release' }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js static export
        working-directory: apps/checklist
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Capacitor sync
        working-directory: apps/checklist
        run: npx cap sync android

      - name: Decode signing keystore
        if: ${{ !inputs.build_type || inputs.build_type == 'release' }}
        working-directory: apps/checklist/android
        env:
          KEYSTORE_BASE64: ${{ secrets.CHECKLIST_KEYSTORE_BASE64 }}
        run: |
          mkdir -p app/keystore
          echo "$KEYSTORE_BASE64" | base64 -d > app/keystore/release.keystore
          # Sanity check: file must exist and be non-empty
          test -s app/keystore/release.keystore

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          build-root-directory: apps/checklist/android
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build Release (AAB + APK)
        if: ${{ !inputs.build_type || inputs.build_type == 'release' }}
        working-directory: apps/checklist/android
        env:
          KEYSTORE_PATH: app/keystore/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.CHECKLIST_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.CHECKLIST_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.CHECKLIST_KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease assembleRelease \
            -Pandroid.injected.signing.store.file=$PWD/$KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --no-daemon --stacktrace

      - name: Build Debug APK
        if: ${{ inputs.build_type == 'debug' }}
        working-directory: apps/checklist/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Clean up keystore
        if: always() && (!inputs.build_type || inputs.build_type == 'release')
        working-directory: apps/checklist/android
        run: rm -f app/keystore/release.keystore

      - name: Upload AAB (Play Store)
        if: ${{ !inputs.build_type || inputs.build_type == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: checklist-aab-${{ github.sha }}
          path: apps/checklist/android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 30

      - name: Upload Release APK (sideload)
        if: ${{ !inputs.build_type || inputs.build_type == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: checklist-apk-${{ github.sha }}
          path: apps/checklist/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload Debug APK
        if: ${{ inputs.build_type == 'debug' }}
        uses: actions/upload-artifact@v4
        with:
          name: checklist-debug-apk-${{ github.sha }}
          path: apps/checklist/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload ProGuard mapping
        if: ${{ !inputs.build_type || inputs.build_type == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: checklist-mapping-${{ github.sha }}
          path: apps/checklist/android/app/build/outputs/mapping/release/mapping.txt
          if-no-files-found: warn
          retention-days: 90
