name: Build Operator_2 Android

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        type: choice
        options:
          - debug
          - release
        default: debug

jobs:
  build-android:
    name: Build Android (${{ inputs.build_type }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Write .env for Expo bundler
        working-directory: apps/operator_2
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.OPERATOR2_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.OPERATOR2_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$EXPO_PUBLIC_SUPABASE_URL" ] || [ -z "$EXPO_PUBLIC_SUPABASE_ANON_KEY" ]; then
            echo "::error::Missing OPERATOR2_SUPABASE_URL or OPERATOR2_SUPABASE_ANON_KEY repo secret"
            exit 1
          fi
          printf 'EXPO_PUBLIC_SUPABASE_URL=%s\n' "$EXPO_PUBLIC_SUPABASE_URL" >  .env
          printf 'EXPO_PUBLIC_SUPABASE_ANON_KEY=%s\n' "$EXPO_PUBLIC_SUPABASE_ANON_KEY" >> .env

      - name: Expo prebuild (regenerate android/)
        working-directory: apps/operator_2
        run: npx expo prebuild --platform android --clean --no-install

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          build-root-directory: apps/operator_2/android
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build Debug APK
        if: ${{ inputs.build_type == 'debug' }}
        working-directory: apps/operator_2/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release APK (unsigned)
        if: ${{ inputs.build_type == 'release' }}
        working-directory: apps/operator_2/android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload Debug APK
        if: ${{ inputs.build_type == 'debug' }}
        uses: actions/upload-artifact@v4
        with:
          name: operator_2-debug-apk-${{ github.sha }}
          path: apps/operator_2/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload Release APK
        if: ${{ inputs.build_type == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: operator_2-release-apk-${{ github.sha }}
          path: apps/operator_2/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30
